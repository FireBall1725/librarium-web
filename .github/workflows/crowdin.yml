name: Crowdin Sync

on:
  push:
    branches: [main]
    paths:
      - 'public/locales/en-CA/**'
      - 'crowdin.yml'
      - '.github/workflows/crowdin.yml'
  schedule:
    # Download translations every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  crowdin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: crowdin/translations
          create_pull_request: true
          pull_request_title: 'chore(i18n): new translations from Crowdin'
          pull_request_body: |
            Automated translation sync from Crowdin.

            Review the updated locale files and merge when ready.
          pull_request_labels: 'i18n, automated'
          pull_request_base_branch_name: main
          commit_message: 'chore(i18n): update translations from Crowdin'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ vars.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
